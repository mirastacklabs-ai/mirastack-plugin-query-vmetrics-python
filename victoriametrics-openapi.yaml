openapi: 3.0.3
info:
  title: VictoriaMetrics API
  description: |
    Complete API specification for VictoriaMetrics time series database.
    
    VictoriaMetrics is a fast, cost-effective and scalable monitoring solution and time series database.
    This specification covers all HTTP endpoints for:
    - Single-node VictoriaMetrics
    - Cluster components (vminsert, vmselect, vmstorage)
    - vmagent (metrics collection agent)
    - vmalert (alerting and recording rules)
    - vmauth (authentication proxy)
    - vmbackup/vmrestore (backup tools)
    
    **Note**: This specification was generated by analyzing the VictoriaMetrics source code directly.
    All endpoints, parameters, and responses are extracted from the actual implementation.
    
    **Documentation**: https://docs.victoriametrics.com/
    **Source Code**: https://github.com/VictoriaMetrics/VictoriaMetrics
  version: 1.0.0
  contact:
    name: VictoriaMetrics Support
    url: https://victoriametrics.com/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8428
    description: Single-node VictoriaMetrics (default)
  - url: http://localhost:8429
    description: vmagent
  - url: http://localhost:8480
    description: vminsert (cluster)
  - url: http://localhost:8481
    description: vmselect (cluster)
  - url: http://localhost:8482
    description: vmstorage (cluster)
  - url: http://localhost:8880
    description: vmalert

tags:
  - name: Write
    description: Endpoints for ingesting metrics data
  - name: Query
    description: Endpoints for querying metrics (Prometheus-compatible)
  - name: Export
    description: Endpoints for exporting data in various formats
  - name: Admin
    description: Administrative endpoints
  - name: Graphite
    description: Graphite-compatible API endpoints
  - name: Promscrape
    description: Prometheus scraping configuration and targets
  - name: Status
    description: Status and monitoring endpoints
  - name: Snapshot
    description: Snapshot management (vmstorage)
  - name: Rules
    description: Alerting and recording rules (vmalert)
  - name: UI
    description: Web UI endpoints

security:
  - BasicAuth: []
  - BearerAuth: []
  - AuthKey: []

paths:
  /:
    get:
      summary: Homepage
      description: Returns HTML homepage with links to useful endpoints
      tags: [UI]
      responses:
        '200':
          description: HTML homepage
          content:
            text/html:
              schema:
                type: string
  
  # ========================================
  # WRITE ENDPOINTS
  # ========================================
  
  /api/v1/write:
    post:
      summary: Prometheus Remote Write
      description: |
        Accepts metrics in Prometheus remote write protocol buffer format.
        This is the primary endpoint for pushing metrics to VictoriaMetrics.
      tags: [Write]
      requestBody:
        required: true
        content:
          application/x-protobuf:
            schema:
              type: string
              format: binary
              description: Prometheus remote write protocol buffer
      responses:
        '204':
          description: Data successfully ingested
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
  
  /api/v1/import:
    post:
      summary: Import VictoriaMetrics native format
      description: |
        Import data in VictoriaMetrics JSON format.
        Each line must contain a JSON object with metric name, values and timestamps.
      tags: [Write]
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
              description: Newline-delimited JSON
            example: |
              {"metric":{"__name__":"foo","job":"node_exporter"},"values":[1,2,3],"timestamps":[1677721000000,1677721060000,1677721120000]}
              {"metric":{"__name__":"bar","instance":"localhost"},"values":[100,200],"timestamps":[1677721000000,1677721060000]}
      responses:
        '204':
          description: Data successfully imported
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
  
  /api/v1/import/csv:
    post:
      summary: Import CSV format
      description: Import time series data in CSV format
      tags: [Write]
      parameters:
        - name: format
          in: query
          required: true
          description: |
            Comma-separated column format. Supported formats:
            - `<label1_name>:<label1_value>,<label2_name>:<label2_value>,...,<timestamp>,<value>` 
            - `<metric_name>,<label1_value>,<label2_value>,...,<timestamp>,<value>`
          schema:
            type: string
          example: "__name__:temperature,site:site1,timestamp:rfc3339,value"
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
            example: |
              site1,1677721000,25.5
              site2,1677721000,26.3
      responses:
        '204':
          description: Data successfully imported
        '400':
          description: Bad request
  
  /api/v1/import/native:
    post:
      summary: Import native binary format
      description: |
        Import data in VictoriaMetrics native binary format.
        This format is the most efficient for data migration between VictoriaMetrics instances.
      tags: [Write]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: Data successfully imported
        '400':
          description: Bad request
  
  /api/v1/import/prometheus:
    post:
      summary: Import Prometheus text exposition format
      description: |
        Import data in Prometheus text exposition format.
        This endpoint is compatible with Prometheus push gateway.
      tags: [Write]
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
            example: |
              # HELP http_requests_total Total number of HTTP requests
              # TYPE http_requests_total counter
              http_requests_total{method="GET",code="200"} 1027 1677721000000
              http_requests_total{method="POST",code="200"} 3 1677721000000
      responses:
        '204':
          description: Data successfully imported
        '200':
          description: Data successfully imported (pushgateway compatibility)
        '400':
          description: Bad request
  
  /influx/write:
    post:
      summary: InfluxDB line protocol write
      description: |
        Accepts metrics in InfluxDB line protocol format.
        Compatible with InfluxDB v1.x and v2.x clients.
      tags: [Write]
      parameters:
        - name: db
          in: query
          description: Database name (ignored, for compatibility)
          schema:
            type: string
        - name: precision
          in: query
          description: Timestamp precision (ns, us, ms, s, m, h)
          schema:
            type: string
            default: ns
            enum: [ns, us, ms, s, m, h]
        - name: rp
          in: query
          description: Retention policy (ignored, for compatibility)
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
            example: |
              cpu,host=server01,region=us-west value=0.64 1677721000000000000
              cpu,host=server02,region=us-east value=0.89 1677721000000000000
      responses:
        '204':
          description: Data successfully written
        '400':
          description: Bad request
  
  /influx/query:
    get:
      summary: InfluxDB query endpoint
      description: Returns database names (for InfluxDB compatibility)
      tags: [Write]
      parameters:
        - name: q
          in: query
          description: Query string
          schema:
            type: string
      responses:
        '200':
          description: Database list
          content:
            application/json:
              schema:
                type: object
  
  /influx/health:
    get:
      summary: InfluxDB health check
      description: Returns health status (for InfluxDB compatibility)
      tags: [Write]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
  
  /opentelemetry/v1/metrics:
    post:
      summary: OpenTelemetry metrics push
      description: Accepts metrics in OpenTelemetry protocol buffer format
      tags: [Write]
      requestBody:
        required: true
        content:
          application/x-protobuf:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Metrics accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  partialSuccess:
                    type: object
        '400':
          description: Bad request
  
  /datadog/api/v1/series:
    post:
      summary: Datadog v1 series submission
      description: Accepts metrics in Datadog v1 API format
      tags: [Write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                series:
                  type: array
                  items:
                    type: object
                    properties:
                      metric:
                        type: string
                      points:
                        type: array
                        items:
                          type: array
                      type:
                        type: string
                      host:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
            example:
              series:
                - metric: system.cpu.usage
                  points: [[1677721000, 0.64]]
                  type: gauge
                  host: server01
                  tags: ["region:us-west"]
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  
  /datadog/api/v2/series:
    post:
      summary: Datadog v2 series submission
      description: Accepts metrics in Datadog v2 API format
      tags: [Write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  
  /datadog/api/v1/validate:
    get:
      summary: Datadog API key validation
      description: Always returns valid (for Datadog compatibility)
      tags: [Write]
      responses:
        '200':
          description: API key is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
  
  /newrelic/infra/v2/metrics/events/bulk:
    post:
      summary: New Relic infrastructure metrics
      description: Accepts metrics in New Relic Infrastructure API format
      tags: [Write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  
  # ========================================
  # QUERY ENDPOINTS
  # ========================================
  
  /api/v1/query:
    get:
      summary: Instant query
      description: |
        Executes a PromQL query at a single point in time.
        Compatible with Prometheus instant query API.
      tags: [Query]
      parameters:
        - name: query
          in: query
          required: true
          description: PromQL expression to evaluate
          schema:
            type: string
          example: up
        - name: time
          in: query
          description: |
            Evaluation timestamp (unix timestamp or RFC3339).
            Defaults to current time.
          schema:
            type: string
          example: "1677721000"
        - name: timeout
          in: query
          description: Query timeout
          schema:
            type: string
          example: 30s
        - name: step
          in: query
          description: Query step (for rollup functions)
          schema:
            type: string
          example: 5m
        - name: trace
          in: query
          description: Enable query tracing
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      resultType:
                        type: string
                        enum: [matrix, vector, scalar, string]
                      result:
                        type: array
                        items:
                          type: object
                          properties:
                            metric:
                              type: object
                              additionalProperties:
                                type: string
                            value:
                              type: array
                              items: {}
              example:
                status: success
                data:
                  resultType: vector
                  result:
                    - metric:
                        __name__: up
                        job: node_exporter
                        instance: localhost:9100
                      value: [1677721000, "1"]
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Query timeout or service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Instant query (POST)
      description: Same as GET but accepts form data
      tags: [Query]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                time:
                  type: string
                timeout:
                  type: string
                step:
                  type: string
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
  
  /api/v1/query_range:
    get:
      summary: Range query
      description: |
        Executes a PromQL query over a time range.
        Compatible with Prometheus range query API.
      tags: [Query]
      parameters:
        - name: query
          in: query
          required: true
          description: PromQL expression to evaluate
          schema:
            type: string
          example: rate(http_requests_total[5m])
        - name: start
          in: query
          required: true
          description: Start timestamp (unix timestamp or RFC3339)
          schema:
            type: string
          example: "1677721000"
        - name: end
          in: query
          required: true
          description: End timestamp (unix timestamp or RFC3339)
          schema:
            type: string
          example: "1677724600"
        - name: step
          in: query
          required: true
          description: Query resolution step (duration)
          schema:
            type: string
          example: 1m
        - name: timeout
          in: query
          description: Query timeout
          schema:
            type: string
          example: 5m
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                status: success
                data:
                  resultType: matrix
                  result:
                    - metric:
                        __name__: http_requests_total
                        job: api
                      values:
                        - [1677721000, "100"]
                        - [1677721060, "105"]
                        - [1677721120, "110"]
    post:
      summary: Range query (POST)
      description: Same as GET but accepts form data
      tags: [Query]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - query
                - start
                - end
                - step
              properties:
                query:
                  type: string
                start:
                  type: string
                end:
                  type: string
                step:
                  type: string
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
  
  /api/v1/series:
    get:
      summary: Find series by label matchers
      description: |
        Returns the list of time series that match label selectors.
        Compatible with Prometheus series API.
      tags: [Query]
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector (can be repeated)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["up", "process_cpu_seconds_total{job='node_exporter'}"]
        - name: start
          in: query
          description: Start timestamp
          schema:
            type: string
        - name: end
          in: query
          description: End timestamp
          schema:
            type: string
      responses:
        '200':
          description: Series list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties:
                        type: string
              example:
                status: success
                data:
                  - __name__: up
                    job: node_exporter
                    instance: localhost:9100
                  - __name__: up
                    job: prometheus
                    instance: localhost:9090
  
  /api/v1/series/count:
    get:
      summary: Count time series
      description: Returns the count of time series matching the selectors
      tags: [Query]
      parameters:
        - name: match[]
          in: query
          description: Series selector (can be repeated)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Series count
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: integer
              example:
                status: success
                data: 12345
  
  /api/v1/labels:
    get:
      summary: Get label names
      description: |
        Returns the list of label names.
        Compatible with Prometheus labels API.
      tags: [Query]
      parameters:
        - name: start
          in: query
          description: Start timestamp
          schema:
            type: string
        - name: end
          in: query
          description: End timestamp
          schema:
            type: string
        - name: match[]
          in: query
          description: Series selector to filter labels
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Label names list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      type: string
              example:
                status: success
                data: ["__name__", "job", "instance", "method", "code"]
  
  /api/v1/label/{labelName}/values:
    get:
      summary: Get label values
      description: |
        Returns the list of values for a specific label.
        Compatible with Prometheus label values API.
      tags: [Query]
      parameters:
        - name: labelName
          in: path
          required: true
          description: Label name
          schema:
            type: string
          example: job
        - name: start
          in: query
          description: Start timestamp
          schema:
            type: string
        - name: end
          in: query
          description: End timestamp
          schema:
            type: string
        - name: match[]
          in: query
          description: Series selector to filter values
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Label values list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      type: string
              example:
                status: success
                data: ["node_exporter", "prometheus", "alertmanager"]
  
  /api/v1/status/tsdb:
    get:
      summary: TSDB statistics
      description: |
        Returns TSDB statistics including cardinality information.
        Compatible with Prometheus TSDB stats API.
      tags: [Status]
      parameters:
        - name: topN
          in: query
          description: Number of top entries to return
          schema:
            type: integer
            default: 10
        - name: date
          in: query
          description: Date for statistics (unix timestamp)
          schema:
            type: string
      responses:
        '200':
          description: TSDB statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      seriesCountByMetricName:
                        type: array
                      seriesCountByLabelName:
                        type: array
                      seriesCountByLabelValuePair:
                        type: array
                      labelValueCountByLabelName:
                        type: array
  
  /api/v1/metadata:
    get:
      summary: Metric metadata
      description: Returns metric metadata (for Prometheus compatibility)
      tags: [Query]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: metric
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
  
  # ========================================
  # EXPORT ENDPOINTS
  # ========================================
  
  /api/v1/export:
    get:
      summary: Export JSON stream
      description: |
        Exports raw samples in JSON stream format (newline-delimited JSON).
        Use this for data migration or analysis.
      tags: [Export]
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector (can be repeated)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["up", "node_cpu_seconds_total"]
        - name: start
          in: query
          description: Start timestamp (inclusive)
          schema:
            type: string
        - name: end
          in: query
          description: End timestamp (inclusive)
          schema:
            type: string
        - name: max_rows_per_line
          in: query
          description: Maximum data points per JSON line
          schema:
            type: integer
            default: 10000
      responses:
        '200':
          description: JSON stream of samples
          content:
            application/stream+json:
              schema:
                type: string
              example: |
                {"metric":{"__name__":"up","job":"node_exporter"},"values":[1,1,1],"timestamps":[1677721000000,1677721060000,1677721120000]}
                {"metric":{"__name__":"node_cpu_seconds_total","cpu":"0"},"values":[123.45,123.56,123.67],"timestamps":[1677721000000,1677721060000,1677721120000]}
  
  /api/v1/export/csv:
    get:
      summary: Export CSV
      description: Exports data in CSV format
      tags: [Export]
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: format
          in: query
          required: true
          description: CSV column format specification
          schema:
            type: string
          example: "__name__,label1,label2,timestamp:unix_ms,value"
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
      responses:
        '200':
          description: CSV data
          content:
            text/csv:
              schema:
                type: string
  
  /api/v1/export/native:
    get:
      summary: Export native binary format
      description: |
        Exports data in VictoriaMetrics native binary format.
        Most efficient format for data migration.
      tags: [Export]
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Binary data stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  
  /federate:
    get:
      summary: Prometheus federation
      description: |
        Returns metrics in Prometheus text exposition format for federation.
        Compatible with Prometheus federation API.
      tags: [Export]
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  
  # ========================================
  # ADMIN ENDPOINTS
  # ========================================
  
  /api/v1/admin/tsdb/delete_series:
    post:
      summary: Delete time series
      description: |
        Deletes time series matching the given label selectors.
        Requires authentication via -deleteAuthKey flag.
      tags: [Admin]
      security:
        - AuthKey: []
      parameters:
        - name: match[]
          in: query
          required: true
          description: Series selector to delete
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["up{job='node_exporter'}", "old_metric"]
        - name: authKey
          in: query
          description: Authorization key (if -deleteAuthKey is set)
          schema:
            type: string
      responses:
        '204':
          description: Series deleted successfully
        '401':
          description: Unauthorized
        '400':
          description: Bad request
  
  /api/v1/status/metric_names_stats:
    get:
      summary: Metric names usage statistics
      description: |
        Returns statistics about metric name usage - how many times each metric
        was queried and ingested.
      tags: [Admin]
      parameters:
        - name: topN
          in: query
          description: Number of top entries to return
          schema:
            type: integer
        - name: lte
          in: query
          description: Return only metrics with query count less than or equal to this value
          schema:
            type: integer
      responses:
        '200':
          description: Metric statistics
          content:
            application/json:
              schema:
                type: object
  
  /api/v1/admin/status/metric_names_stats/reset:
    post:
      summary: Reset metric names statistics
      description: Resets the metric names usage statistics
      tags: [Admin]
      security:
        - AuthKey: []
      responses:
        '204':
          description: Statistics reset successfully
        '401':
          description: Unauthorized
  
  # ========================================
  # GRAPHITE API ENDPOINTS
  # ========================================
  
  /metrics/find:
    get:
      summary: Graphite metrics find
      description: |
        Returns metrics matching the query in Graphite format.
        Compatible with Graphite API.
      tags: [Graphite]
      parameters:
        - name: query
          in: query
          required: true
          description: Graphite query pattern (supports wildcards)
          schema:
            type: string
          example: "servers.*.cpu"
        - name: format
          in: query
          description: Response format
          schema:
            type: string
            enum: [completer, json, treejson]
            default: json
        - name: wildcards
          in: query
          description: Enable wildcards
          schema:
            type: integer
            enum: [0, 1]
      responses:
        '200':
          description: Matching metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    text:
                      type: string
                    leaf:
                      type: integer
  
  /metrics/expand:
    get:
      summary: Graphite metrics expand
      description: Returns expanded metric paths
      tags: [Graphite]
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: leavesOnly
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Expanded metrics
          content:
            application/json:
              schema:
                type: object
  
  /metrics/index.json:
    get:
      summary: Graphite metrics index
      description: Returns all metric names
      tags: [Graphite]
      responses:
        '200':
          description: All metric names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  
  /render:
    get:
      summary: Graphite render
      description: |
        Renders metrics in various formats.
        Compatible with Graphite render API.
      tags: [Graphite]
      parameters:
        - name: target
          in: query
          required: true
          description: Metric expression (can be repeated)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: from
          in: query
          description: Start time
          schema:
            type: string
          example: "-1h"
        - name: until
          in: query
          description: End time
          schema:
            type: string
          example: "now"
        - name: format
          in: query
          description: Output format
          schema:
            type: string
            enum: [json, png, svg, pdf]
            default: json
      responses:
        '200':
          description: Rendered data
          content:
            application/json:
              schema:
                type: array
            image/png:
              schema:
                type: string
                format: binary
  
  /tags:
    get:
      summary: Graphite tags list
      description: Returns list of tag names
      tags: [Graphite]
      responses:
        '200':
          description: Tag names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  
  /tags/findSeries:
    get:
      summary: Graphite find series by tags
      description: Finds series matching tag expressions
      tags: [Graphite]
      parameters:
        - name: expr
          in: query
          required: true
          description: Tag expression
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Matching series
          content:
            application/json:
              schema:
                type: array
  
  # ========================================
  # PROMSCRAPE ENDPOINTS
  # ========================================
  
  /targets:
    get:
      summary: Discovered targets
      description: |
        Returns human-readable HTML page showing all discovered scrape targets
        and their current status.
      tags: [Promscrape]
      responses:
        '200':
          description: Targets status page
          content:
            text/html:
              schema:
                type: string
  
  /service-discovery:
    get:
      summary: Service discovery
      description: Shows service discovery status with labels before and after relabeling
      tags: [Promscrape]
      responses:
        '200':
          description: Service discovery status
          content:
            text/html:
              schema:
                type: string
  
  /api/v1/targets:
    get:
      summary: Targets API
      description: |
        Returns discovered targets in JSON format.
        Compatible with Prometheus targets API.
      tags: [Promscrape]
      parameters:
        - name: state
          in: query
          description: Filter by target state
          schema:
            type: string
            enum: [active, dropped, any]
        - name: scrapePool
          in: query
          description: Filter by scrape pool name
          schema:
            type: string
      responses:
        '200':
          description: Targets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      activeTargets:
                        type: array
                      droppedTargets:
                        type: array
  
  /config:
    get:
      summary: Configuration
      description: Returns the scrape configuration (requires auth)
      tags: [Promscrape]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Configuration YAML
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized
  
  /api/v1/status/config:
    get:
      summary: Configuration API
      description: |
        Returns configuration in JSON format.
        Compatible with Prometheus config API.
      tags: [Promscrape]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      yaml:
                        type: string
  
  /-/reload:
    post:
      summary: Reload configuration
      description: |
        Triggers configuration reload without restarting the process.
        Requires authentication.
      tags: [Promscrape]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Reload triggered
        '401':
          description: Unauthorized
  
  # ========================================
  # STATUS ENDPOINTS
  # ========================================
  
  /api/v1/status/active_queries:
    get:
      summary: Active queries
      description: Returns currently running queries
      tags: [Status]
      responses:
        '200':
          description: Active queries list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        query:
                          type: string
                        duration:
                          type: string
                        id:
                          type: string
  
  /api/v1/status/top_queries:
    get:
      summary: Top queries
      description: Returns top queries by various metrics
      tags: [Status]
      parameters:
        - name: topByCount
          in: query
          description: Number of top queries by count
          schema:
            type: integer
            default: 20
        - name: topByAvgDuration
          in: query
          description: Number of top queries by average duration
          schema:
            type: integer
            default: 20
        - name: topBySumDuration
          in: query
          description: Number of top queries by sum duration
          schema:
            type: integer
            default: 20
        - name: maxLifetime
          in: query
          description: Max lifetime for queries in stats
          schema:
            type: string
      responses:
        '200':
          description: Top queries
          content:
            application/json:
              schema:
                type: object
  
  /api/v1/status/buildinfo:
    get:
      summary: Build information
      description: Returns build version information
      tags: [Status]
      responses:
        '200':
          description: Build info
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                      revision:
                        type: string
  
  # ========================================
  # SNAPSHOT ENDPOINTS (vmstorage)
  # ========================================
  
  /snapshot/create:
    post:
      summary: Create snapshot
      description: |
        Creates a snapshot of the current data.
        Snapshots can be used for backups.
      tags: [Snapshot]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  snapshot:
                    type: string
                    example: "20230301150405-1234567890ABCDEF"
        '401':
          description: Unauthorized
  
  /snapshot/list:
    get:
      summary: List snapshots
      description: Returns list of all available snapshots
      tags: [Snapshot]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Snapshots list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  snapshots:
                    type: array
                    items:
                      type: string
  
  /snapshot/delete:
    post:
      summary: Delete snapshot
      description: Deletes a specific snapshot
      tags: [Snapshot]
      security:
        - AuthKey: []
      parameters:
        - name: snapshot
          in: query
          required: true
          description: Snapshot name to delete
          schema:
            type: string
      responses:
        '200':
          description: Snapshot deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '401':
          description: Unauthorized
        '400':
          description: Snapshot not found
  
  /snapshot/delete_all:
    post:
      summary: Delete all snapshots
      description: Deletes all existing snapshots
      tags: [Snapshot]
      security:
        - AuthKey: []
      responses:
        '200':
          description: All snapshots deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '401':
          description: Unauthorized
  
  /internal/force_merge:
    post:
      summary: Force merge
      description: |
        Forces merge of storage partitions.
        Can be useful for reducing disk space usage.
      tags: [Admin]
      security:
        - AuthKey: []
      parameters:
        - name: partition_prefix
          in: query
          description: Partition prefix to merge
          schema:
            type: string
      responses:
        '200':
          description: Merge started
        '401':
          description: Unauthorized
  
  /internal/force_flush:
    post:
      summary: Force flush
      description: Forces flush of in-memory data to disk
      tags: [Admin]
      security:
        - AuthKey: []
      responses:
        '200':
          description: Flush completed
        '401':
          description: Unauthorized
  
  # ========================================
  # VMALERT ENDPOINTS
  # ========================================
  
  /vmalert:
    get:
      summary: vmalert UI homepage
      description: Returns vmalert web UI
      tags: [UI, Rules]
      responses:
        '200':
          description: vmalert UI
          content:
            text/html:
              schema:
                type: string
  
  /vmalert/groups:
    get:
      summary: Groups UI
      description: Lists all rule groups in the UI
      tags: [Rules]
      parameters:
        - name: filter
          in: query
          description: Filter groups by name
          schema:
            type: string
      responses:
        '200':
          description: Groups list UI
          content:
            text/html:
              schema:
                type: string
  
  /vmalert/alerts:
    get:
      summary: Alerts UI
      description: Lists all alerts in the UI
      tags: [Rules]
      responses:
        '200':
          description: Alerts list UI
          content:
            text/html:
              schema:
                type: string
  
  /api/v1/rules:
    get:
      summary: List rules
      description: |
        Returns list of alerting and recording rules.
        Compatible with Prometheus rules API.
      tags: [Rules]
      parameters:
        - name: type
          in: query
          description: Filter by rule type
          schema:
            type: string
            enum: [alert, record]
        - name: file
          in: query
          description: Filter by file name
          schema:
            type: string
        - name: rule_group
          in: query
          description: Filter by rule group name
          schema:
            type: string
        - name: rule_name
          in: query
          description: Filter by rule name
          schema:
            type: string
      responses:
        '200':
          description: Rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            file:
                              type: string
                            interval:
                              type: number
                            rules:
                              type: array
  
  /api/v1/alerts:
    get:
      summary: List alerts
      description: |
        Returns list of active alerts.
        Compatible with Prometheus alerts API.
      tags: [Rules]
      responses:
        '200':
          description: Alerts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      alerts:
                        type: array
                        items:
                          type: object
                          properties:
                            labels:
                              type: object
                            annotations:
                              type: object
                            state:
                              type: string
                            activeAt:
                              type: string
                            value:
                              type: string
  
  # ========================================
  # COMMON ENDPOINTS
  # ========================================
  
  /metrics:
    get:
      summary: Prometheus metrics
      description: |
        Returns internal metrics in Prometheus text exposition format.
        Available on all VictoriaMetrics components.
      tags: [Status]
      responses:
        '200':
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP vm_rows_inserted_total Total number of inserted rows
                # TYPE vm_rows_inserted_total counter
                vm_rows_inserted_total 1234567
                
                # HELP vm_http_requests_total Total number of HTTP requests
                # TYPE vm_http_requests_total counter
                vm_http_requests_total{path="/api/v1/query"} 1000
  
  /flags:
    get:
      summary: Command-line flags
      description: Returns all command-line flags and their values
      tags: [Status]
      responses:
        '200':
          description: Flags list
          content:
            text/plain:
              schema:
                type: string
  
  /health:
    get:
      summary: Health check
      description: Returns health status
      tags: [Status]
      responses:
        '200':
          description: Service is healthy
  
  /ping:
    get:
      summary: Ping
      description: Ping endpoint
      tags: [Status]
      responses:
        '200':
          description: Pong
  
  /ready:
    get:
      summary: Readiness check
      description: |
        Returns readiness status.
        Returns 200 when ready, 425 when not ready yet.
      tags: [Status]
      responses:
        '200':
          description: Service is ready
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        '425':
          description: Service is not ready yet
  
  /vmui/:
    get:
      summary: VMUI
      description: VictoriaMetrics Web UI for exploring metrics
      tags: [UI]
      responses:
        '200':
          description: VMUI web interface
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication (configured with -httpAuth.username and -httpAuth.password flags)
    
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication (primarily for vmauth)
    
    AuthKey:
      type: apiKey
      in: query
      name: authKey
      description: Authorization key passed as query parameter for specific endpoints
  
  schemas:
    QueryResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        data:
          type: object
          properties:
            resultType:
              type: string
              enum: [matrix, vector, scalar, string]
            result:
              type: array
              items:
                type: object
        error:
          type: string
        errorType:
          type: string
    
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        errorType:
          type: string
          example: bad_data
        error:
          type: string
          example: invalid query syntax
    
    MetricSample:
      type: object
      properties:
        metric:
          type: object
          additionalProperties:
            type: string
          description: Label key-value pairs
        value:
          type: array
          items: {}
          description: [timestamp, value] pair
          minItems: 2
          maxItems: 2
        values:
          type: array
          items:
            type: array
          description: Array of [timestamp, value] pairs for range queries
    
    Series:
      type: object
      additionalProperties:
        type: string
      description: Label key-value pairs identifying a time series
      example:
        __name__: http_requests_total
        job: api
        instance: localhost:8080
        method: GET
        code: "200"

  parameters:
    QueryParam:
      name: query
      in: query
      required: true
      description: PromQL query expression
      schema:
        type: string
      example: rate(http_requests_total[5m])
    
    StartParam:
      name: start
      in: query
      description: Start timestamp (RFC3339, unix timestamp in seconds, or relative time like -1h)
      schema:
        type: string
      example: "1677721000"
    
    EndParam:
      name: end
      in: query
      description: End timestamp (RFC3339, unix timestamp in seconds, or relative time like now)
      schema:
        type: string
      example: "1677724600"
    
    StepParam:
      name: step
      in: query
      description: Query resolution step (duration string like 1m, 5m, 1h)
      schema:
        type: string
      example: "1m"
    
    TimeoutParam:
      name: timeout
      in: query
      description: Query timeout (duration string)
      schema:
        type: string
      example: "30s"
    
    MatchParam:
      name: match[]
      in: query
      description: Time series selector (can be repeated for multiple matchers)
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
      example: ["up", "node_cpu_seconds_total{mode='idle'}"]
    
    TraceParam:
      name: trace
      in: query
      description: Enable query tracing for debugging
      schema:
        type: boolean
        default: false

  responses:
    NoContent:
      description: Request completed successfully with no content
    
    Unauthorized:
      description: Authentication required or authentication failed
      content:
        text/plain:
          schema:
            type: string
            example: Unauthorized
    
    BadRequest:
      description: Invalid request parameters
      content:
        text/plain:
          schema:
            type: string
    
    ServiceUnavailable:
      description: Service temporarily unavailable or query timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

externalDocs:
  description: VictoriaMetrics Documentation
  url: https://docs.victoriametrics.com/
